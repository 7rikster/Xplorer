<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Xplorer</title>
    <link rel="stylesheet" href="front-page.css">

    <!-- Font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Gogle fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    
</head>
<body>
    <header id="header">
        <div class="logo">
            <a href="#" id="logo"><span>C</span>ity <span>X</span>plorer</a>
        </div>
        <input type="checkbox" id="check">
        <label for="check" class="mainicon">
            <i class="fa-solid fa-bars" id="menu-icon"></i>
        </label>

        <div class="h-btns">
            <button id="sign-up">Sign up</button>
            <button id="sign-in">Sign in</button>
        </div>
    </header>

    <section class="main-body">
        <h2>Welcome to </h2>
        <h1 class="city-xplorer"> <span>C</span>ITY</h1>
        <h1 class="city-xplorer" id="xplorer"><span>X</span>PLORER</h1>
        <h3>Come explore cities with us</h3>
        <button id="explore">Explore</button>
    </section>


    <script src="front-page.js"></script>
</body>
</html>
