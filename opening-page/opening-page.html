<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Xplorer</title>
    <link rel="stylesheet" href="opening-page.css">

    <!-- Font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Gogle fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"> 
</head>
<body>
    <header id="header">
        <div class="logo">
            <a href="#" id="logo"><span>C</span>ity <span>X</span>plorer</a>
        </div>
        <div class="user">
            <h4>xyz@gmail.com <div><i class="fa-solid fa-user"></i></div></h4>
            
        </div>
    </header>

    <section class="main-body">
        <h2>Choose the city you want to explore</h2>
        <div class="city-cards-container">
            <div class="city-card" id="guwahati">
                <h3>Guwahati</h3>
            </div>
            <div class="city-card" id="silchar">
                <h3>Silchar</h3>
            </div>
            <div class="city-card" id="delhi">
                <h3>Delhi</h3>
            </div>
            <div class="city-card" id="mumbai">
                <h3>Mumbai</h3>
            </div>
            <div class="city-card" id="goa">
                <h3>Goa</h3>
            </div>
        </div>
    </section>

    <script src="opening-page.js"></script>
</body>
</html>
